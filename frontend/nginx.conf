events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    limit_req_zone $binary_remote_addr zone=api_general:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api_upload:10m  rate=2r/s;
    limit_conn_zone $binary_remote_addr zone=upload_conn:10m;
 
    server {
        listen 80;
        server_name _;
 
        client_max_body_size 0;
 
        root /var/www/html;
        index index.html;
 
        location / {
            try_files $uri $uri/ /404;
        }
 
        location /api/ {
            limit_req zone=api_general burst=20 nodelay;

            proxy_pass http://backend:3000/;
 
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
 
            proxy_read_timeout  60s;
            proxy_connect_timeout 10s;
            proxy_send_timeout  60s;
        }

        location /api/upload {
            limit_req  zone=api_upload burst=5 nodelay;
            limit_conn upload_conn 3; # 3 uploads per IP
 
            # No buffer
            proxy_request_buffering off;
            proxy_buffering         off;
 
            proxy_pass http://backend:3000/upload;
 
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
 
            # Give large files time to transfer
            proxy_read_timeout    300s;
            proxy_connect_timeout 10s;
            proxy_send_timeout    300s;
        }
    }
}
 
